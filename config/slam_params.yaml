slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /scan
    # Republish/update the map frequently so it can improve over time.
    map_update_interval: 0.5
    # Keep scan processing sustainable to avoid message filter queue overflows.
    throttle_scans: 1
    # Integrate scans regularly while moving without overloading the async mapper.
    minimum_time_interval: 0.2
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    # Match sensor capability and avoid the minimum range warning.
    minimum_laser_range: 0.1
    # Give TF lookup a bit more tolerance on embedded hardware.
    transform_timeout: 0.3